    <script>
      (function () {
        var stored = localStorage.getItem('spotify-history-theme');
        var theme =
          stored === 'light' || stored === 'dark'
            ? stored
            : window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'dark';
        document.documentElement.dataset.theme = theme;
      })();
    </script>
