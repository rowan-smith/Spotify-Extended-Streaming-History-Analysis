    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Explore your Spotify Extended Streaming History locally in your browser. Your data never leaves your device."
    />
    <title>Spotify Streaming History Explorer</title>
    <link id="app-favicon" rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <script>
      (function () {
        const stored = localStorage.getItem('spotify-history-theme');
        const theme =
          stored === 'light' || stored === 'dark'
            ? stored
            : window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'dark';
        document.documentElement.dataset.theme = theme;
        const favicon = document.getElementById('app-favicon');
        if (favicon) {
          favicon.href = theme === 'dark' ? './favicon-dark.svg' : './favicon.svg';
        }
      })();
    </script>
